<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


/* =========================
   BODY
========================= */

body {
    min-height: 100vh;

    background:
        radial-gradient(
            circle at center,
            #bf953f,
            #fcf6ba,
            #b38728,
            #fbf5b7,
            #aa771c
        );

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: 'Poppins', sans-serif;

    overflow: hidden;

    position: relative;
}


/* =========================
   GLASS CARD
========================= */

.card {
    width: 92%;
    max-width: 430px;

    max-height: 92vh;
    overflow-y: auto;

    padding: 30px;

    text-align: center;

    background: rgba(255, 255, 255, 0.68);

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border-radius: 25px;

    border: 2px solid rgba(255, 255, 255, 0.55);

    box-shadow:
        0 15px 40px rgba(0, 0, 0, 0.25);

    position: relative;

    z-index: 10;
}


/* =========================
   TITLE
========================= */

#title {
    font-family: 'Playfair Display', serif;

    font-size: 34px;

    font-weight: 700;

    color: #4a3728;

    margin-bottom: 30px;

    line-height: 1.3;
}


/* =========================
   START BUTTON
========================= */

#start-btn {
    padding: 17px 35px;

    font-family: 'Poppins', sans-serif;

    font-size: 18px;

    font-weight: 600;

    color: white;

    background:
        linear-gradient(
            135deg,
            #8b5a2b,
            #bf953f
        );

    border: none;

    border-radius: 50px;

    cursor: pointer;

    box-shadow:
        0 8px 20px rgba(139, 90, 43, 0.35);

    transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
}

#start-btn:hover {
    transform: scale(1.06);

    box-shadow:
        0 12px 25px rgba(139, 90, 43, 0.45);
}

#start-btn:active {
    transform: scale(0.96);
}


/* =========================
   FINAL REVEAL
========================= */

#final-reveal {
    margin-top: 25px;

    opacity: 0;

    transform: translateY(20px);

    transition:
        opacity 1.5s ease,
        transform 1.5s ease;
}

#final-reveal.show {
    opacity: 1;

    transform: translateY(0);
}


/* =========================
   PHOTO AREA
========================= */

.photo-area {
    position: relative;

    width: 100%;

    display: flex;

    justify-content: center;

    align-items: center;

    margin: 0 auto;

    padding: 25px;
}


/* =========================
   PHOTO
========================= */

.photo {
    width: 100%;
    max-width: 320px;

    display: block;

    border-radius: 20px;

    border: 4px solid #bf953f;

    box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.25);

    opacity: 0;

    transform: scale(0.7);

    transition:
        opacity 2s ease,
        transform 2s ease;

    position: relative;

    z-index: 3;
}

.photo.show {
    opacity: 1;

    transform: scale(1);
}


/* =========================
   ORBIT AREA
========================= */

.orbit {
    position: absolute;

    width: 115%;
    height: 115%;

    top: 50%;
    left: 50%;

    transform:
        translate(-50%, -50%);

    opacity: 0;

    z-index: 5;

    pointer-events: none;

    transition:
        opacity 1.5s ease;
}

.orbit.show {
    opacity: 1;

    animation:
        orbitRotate 12s linear infinite;
}


/* =========================
   ORBIT ITEMS
========================= */

.orbit span {
    position: absolute;

    font-size: 28px;

    transform:
        translate(-50%, -50%);

    filter:
        drop-shadow(0 0 5px gold);

    animation:
        orbitTwinkle 1.8s ease-in-out infinite;
}


/* Different animation delays */

.orbit span:nth-child(1) {
    animation-delay: 0s;
}

.orbit span:nth-child(2) {
    animation-delay: 0.3s;
}

.orbit span:nth-child(3) {
    animation-delay: 0.6s;
}

.orbit span:nth-child(4) {
    animation-delay: 0.9s;
}

.orbit span:nth-child(5) {
    animation-delay: 1.2s;
}

.orbit span:nth-child(6) {
    animation-delay: 1.5s;
}


/* =========================
   ORBIT ROTATION
========================= */

@keyframes orbitRotate {

    from {
        transform:
            translate(-50%, -50%)
            rotate(0deg);
    }

    to {
        transform:
            translate(-50%, -50%)
            rotate(360deg);
    }

}


/* =========================
   ORBIT TWINKLE
========================= */

@keyframes orbitTwinkle {

    0% {
        opacity: 0.6;
        scale: 0.85;
    }

    50% {
        opacity: 1;
        scale: 1.15;
    }

    100% {
        opacity: 0.6;
        scale: 0.85;
    }

}


/* =========================
   BACKGROUND STARS
========================= */

.star {
    position: fixed;

    font-size: 20px;

    opacity: 0;

    z-index: 2;

    pointer-events: none;

    animation:
        starTwinkle 3s ease-in-out infinite;
}


/* =========================
   STAR TWINKLE
========================= */

@keyframes starTwinkle {

    0% {
        opacity: 0;

        transform:
            scale(0.3)
            rotate(0deg);
    }

    50% {
        opacity: 1;

        transform:
            scale(1.2)
            rotate(180deg);
    }

    100% {
        opacity: 0;

        transform:
            scale(0.3)
            rotate(360deg);
    }

}


/* =========================
   TYPING MESSAGE
========================= */

.full-text {
    margin-top: 25px;

    padding: 0 5px;

    color: #3f3025;

    font-size: 17px;

    line-height: 1.8;

    font-weight: 600;

    white-space: pre-line;

    min-height: 180px;

    text-align: center;
}


/* =========================
   CURSOR
========================= */

#typing::after {
    content: "|";

    display: inline-block;

    margin-left: 3px;

    animation:
        cursorBlink 0.8s infinite;
}


@keyframes cursorBlink {

    0%,
    50% {
        opacity: 1;
    }

    51%,
    100% {
        opacity: 0;
    }

}


/* =========================
   MOBILE
========================= */

@media (max-width: 480px) {

    .card {
        padding: 22px;

        width: 94%;
    }

    #title {
        font-size: 28px;

        margin-bottom: 25px;
    }

    #start-btn {
        padding: 15px 28px;

        font-size: 16px;
    }

    .photo-area {
        padding: 20px;
    }

    .photo {
        max-width: 280px;
    }

    .orbit span {
        font-size: 23px;
    }

    .full-text {
        font-size: 15px;

        line-height: 1.7;
    }

}

</style>

</head>

<body>

<!-- =========================
     MAIN CARD
========================= -->

<div class="card">

```
<!-- TITLE -->

<div id="title">
    Level 30: Still my favorite view. 🎂❤️
</div>


<!-- START BUTTON -->

<button id="start-btn">
    💖 Click For Surprise 💖
</button>


<!-- FINAL CONTENT -->

<div id="final-reveal">


    <!-- PHOTO + ORBIT -->

    <div class="photo-area">


        <!-- PHOTO -->

        <img
            src="Untitled.jpg"
            class="photo"
            id="photo"
            alt="Birthday Photo"
        >


        <!-- ORBIT -->

        <div
            class="orbit"
            id="orbit"
        >

            <span>⭐</span>
            <span>🎂</span>
            <span>⭐</span>
            <span>🎂</span>
            <span>⭐</span>
            <span>🎂</span>

        </div>


    </div>


    <!-- TYPING MESSAGE -->

    <div
        class="full-text"
        id="typing"
    ></div>


</div>
```

</div>

<!-- =========================
     MUSIC
========================= -->

<audio
id="music"
preload="auto"

>

```
<source
    src="Happy Birthday.mp3"
    type="audio/mpeg"
>
```

</audio>

<script>


/* =========================
   GET ELEMENTS
========================= */

const btn =
    document.getElementById("start-btn");

const reveal =
    document.getElementById("final-reveal");

const photo =
    document.getElementById("photo");

const orbit =
    document.getElementById("orbit");

const music =
    document.getElementById("music");

const typingBox =
    document.getElementById("typing");


/* =========================
   BIRTHDAY MESSAGE
========================= */

const message =
`Happy 30th!
Chapter 30: The best is yet to come.

I’m so incredibly proud of the woman you’ve become.

Keep chasing your dreams, and always remember
that I’m in your corner.

Love you, Happy Birthday my love! 🎂❤️🎈`;


/* =========================
   START SURPRISE
========================= */

btn.addEventListener(
    "click",
    startSurprise
);


function startSurprise() {


    /* Prevent clicking twice */

    btn.disabled = true;


    /* Hide button */

    btn.style.opacity = "0";

    btn.style.transform =
        "scale(0.7)";

    setTimeout(() => {

        btn.style.display = "none";

    }, 400);


    /* =========================
       MUSIC
    ========================= */

    music.currentTime = 0;

    music.volume = 1;

    music.play().catch(
        error => {

            console.log(
                "Music could not autoplay:",
                error
            );

        }
    );


    /* =========================
       CREATE BACKGROUND STARS
    ========================= */

    createStars();


    /* =========================
       SHOW PHOTO
    ========================= */

    setTimeout(() => {

        reveal.classList.add("show");

    }, 800);


    setTimeout(() => {

        photo.classList.add("show");

    }, 1000);


    /* =========================
       START ORBIT
    ========================= */

    setTimeout(() => {

        arrangeOrbit();

        orbit.classList.add("show");

    }, 2800);


    /* =========================
       START TYPING
    ========================= */

    setTimeout(() => {

        typeWriter();

    }, 3500);

}


/* =========================
   CREATE STARS
========================= */

function createStars() {


    const totalStars = 35;


    for (
        let i = 0;
        i < totalStars;
        i++
    ) {


        const star =
            document.createElement("div");


        star.className =
            "star";


        star.innerHTML =
            "⭐";


        /* Random Position */

        star.style.left =
            Math.random() * 100 + "vw";


        star.style.top =
            Math.random() * 100 + "vh";


        /* Random Size */

        star.style.fontSize =
            14 +
            Math.random() * 22 +
            "px";


        /* Random Delay */

        star.style.animationDelay =
            Math.random() * 5 +
            "s";


        /* Random Speed */

        star.style.animationDuration =
            2 +
            Math.random() * 3 +
            "s";


        document.body.appendChild(
            star
        );


    }

}


/* =========================
   ARRANGE ORBIT
========================= */

function arrangeOrbit() {


    const items =
        document.querySelectorAll(
            ".orbit span"
        );


    const radius = 48;

    const center = 50;


    items.forEach(
        (item, index) => {


            const angle =
                (
                    360 /
                    items.length
                ) * index;


            const x =
                center +
                Math.cos(
                    angle *
                    Math.PI /
                    180
                ) *
                radius;


            const y =
                center +
                Math.sin(
                    angle *
                    Math.PI /
                    180
                ) *
                radius;


            item.style.left =
                x + "%";


            item.style.top =
                y + "%";


        }
    );

}


/* =========================
   TYPING ANIMATION
========================= */

function typeWriter() {


    let i = 0;


    typingBox.textContent =
        "";


    function write() {


        if (
            i <
            message.length
        ) {


            typingBox.textContent +=
                message.charAt(i);


            i++;


            setTimeout(
                write,
                55
            );


        }

    }


    write();

}


</script>

</body>

</html>
